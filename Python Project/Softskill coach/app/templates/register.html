{% extends "base.html" %}

{% block title %}Register - SoftSkill Coach{% endblock %}

{% block content %}
<div class="auth-wrapper">
    <div class="card auth-card">
        <h2>Register</h2>
        <p class="subtitle">Create a new account</p>

        <form>
            <div>
                <input
                    type="text"
                    placeholder="Username"
                    required
                >
            </div>

            <div>
                <input
                    type="email"
                    placeholder="Email"
                    required
                >
            </div>

            <div>
                <input
                    type="password"
                    placeholder="Password"
                    required
                >
            </div>

            <button type="submit">
                Register
            </button>
        </form>

        <p class="auth-link">
            Already have an account? <a href="/login">Login</a>
        </p>
    </div>
</div>
{% endblock %}
